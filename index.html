<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilik Aduan</title>

    <style>
        body {
            margin: 0;
            font-family: "Inter", "Segoe UI", sans-serif;
            background: #f5f7fb;
        }

        header {
            background: linear-gradient(135deg, #0b3d91, #1e5edb);
            color: white;
            padding: 18px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card{
            background: white;
            width: 100%;
            max-width: 420px;
            padding: 25px;
            border-radius: 10px;
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: #0b3d91;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #333;
        }

        select, textarea, input {
            width: 100%;
            margin-top: 6px;
            margin-bottom: 16px;
            padding: 11px;
            border-radius: 8px;
            border: 1px solid #dcdfe6;
            font-size: 14px;
            transition: 0.2s;
        }

        select:focus, textarea:focus, input:focus {
            outline: none;
            border-color: #1e5edb;
            box-shadow: 0 0 0 2px rgba(30,94,219,0.15);
        }

        textarea {
            resize: none;
        }

        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #0b3d91, #1e5edb);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .preview {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .preview img {
            width: 80px;
            margin: 5px;
        }
    </style>
</head>

<body>

<header>SISTEM BILIK ADUAN</header>
<p style="text-align:center; font-size:13px; color:#666;">
    Sampaikan aduan Anda secara aman dan anonim
</p>

<div class="container">
    <div class="card">

        <h2>Form Aduan</h2>

        <label>Tujuan</label>
        <select id="target">
            <option value="HR">HR</option>
            <option value="Manager">Manager</option>
        </select>

        <label>Email (opsional untuk balasan)</label>
        <input type="email" id="sender_email" placeholder="Masukkan email jika ingin dibalas">
        <textarea id="message" placeholder="Pesan aduan"></textarea>

        <label>Lampiran (wajib)</label>
        <input type="file" id="file" multiple>

        <div class="preview" id="preview"></div>

        <button id="submitBtn">Kirim Aduan</button>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
    const fileInput = document.getElementById("file");
    const preview = document.getElementById("preview");
    const btn = document.getElementById("submitBtn");

    fileInput.addEventListener("change", () => {
        preview.innerHTML = "";
        for (let file of fileInput.files) {
            if (file.type.startsWith("image")) {
                const img = document.createElement("img");
                img.src = URL.createObjectURL(file);
                preview.appendChild(img);
            }
        }
    });

    btn.addEventListener("click", submitForm);

    async function submitForm() {
        const target = document.getElementById("target").value;
        const message = document.getElementById("message").value;
        const files = fileInput.files;
        const email = document.getElementById("sender_email").value;

        if (!message) return alert("Pesan wajib diisi");
        if (!files.length) return alert("Lampiran wajib ada");
            
        // basic validation
        for (let file of files) {
            if (file.size > 5 * 1024 * 1024) {
                return alert("File max 5MB");
            }
        }

        btn.disabled = true;
        btn.textContent = "Mengirim...";

        // Upload files
        const formData = new FormData();
        formData.append("target", target);
        formData.append("message", message);
        formData.append("sender_email", email);

        // append ALL files
        for (let file of files) {
            formData.append("files", file);
        };

        try {
            const res = await fetch("https://cejrgbgpugcdstlwiptr.supabase.co/functions/v1/submit-complaint", {
                method: "POST",
                body: formData
            });

            if (!res.ok) {
                const text = await res.text();
                console.error("SERVER ERROR:", text);
                alert("Error: " + text);
                throw new Error(text);
            }

            alert("Aduan berhasil dikirim");

            document.getElementById("message").value = "";
            fileInput.value = "";
            preview.innerHTML = "";

        } catch {
            alert("Gagal kirim");
        }

        btn.disabled = false;
        btn.textContent = "Kirim";
    }
</script>

</body>
</html>
