<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilik Aduan</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #eef2f5;
        }

        header {
            background: #0b3d91;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card{
            background: white;
            width: 100%;
            max-width: 420px;
            padding: 25px;
            border-radius: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0b3d91;
            color: white;
            border: none;
        }

        .preview img {
            width: 80px;
            margin: 5px;
        }
    </style>
</head>

<body>

<header>SISTEM BILIK ADUAN</header>

<div class="container">
    <div class="card">

        <h2>Form Aduan</h2>

        <label>Tujuan</label>
        <select id="target">
            <option value="HR">HR</option>
            <option value="Manager">Manager</option>
        </select>

        <label>Email (opsional untuk balasan)</label>
        <input type="email" id="sender_email" placeholder="Masukkan email jika ingin dibalas">
        <textarea id="message" placeholder="Pesan aduan"></textarea>

        <label>Lampiran (wajib)</label>
        <input type="file" id="file" multiple>

        <div class="preview" id="preview"></div>

        <div class="cf-turnstile" data-sitekey="0x4AAAAAAC84VGHaoGzqFDDG"></div>

        <button id="submitBtn" onclick="submitForm()">Kirim Aduan</button>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<script>
    const fileInput = document.getElementById("file");
    const preview = document.getElementById("preview");
    const btn = document.getElementById("submitBtn");

    fileInput.addEventListener("change", () => {
        preview.innerHTML = "";
        for (let file of fileInput.files) {
            if (file.type.startsWith("image")) {
                const img = document.createElement("img");
                img.src = URL.createObjectURL(file);
                preview.appendChild(img);
            }
        }
    });

    btn.addEventListener("click", submitForm);

    async function submitForm() {
        const target = document.getElementById("target").value;
        const message = document.getElementById("message").value;
        const files = fileInput.files;
        const token = document.querySelector('textarea[name="cf-turnstile-response"]')?.value;
        const email = document.getElementById("sender_email").value;

        if (!message) return alert("Pesan wajib diisi");
        if (!files.length) return alert("Lampiran wajib ada");
        if (!token || token.length < 10) {
            return alert("Selesaikan CAPTCHA");  
        }
            
        // basic validation
        for (let file of files) {
            if (file.size > 5 * 1024 * 1024) {
                return alert("File max 5MB");
            }
        }

        btn.disabled = true;
        btn.textContent = "Mengirim...";

        // Upload files
        const formData = new FormData();
        formData.append("target", target);
        formData.append("message", message);
        formData.append("sender_email", email);
        formData.append("captcha", token);

        // append ALL files
        for (let file of files) {
            formData.append("files", file);
        };

        try {
            const res = await fetch("https://cejrgbgpugcdstlwiptr.supabase.co/functions/v1/submit-complaint", {
                method: "POST",
                body: formData
            });

            if (!res.ok) {
                const text = await res.text();
                console.error("SERVER ERROR:", text);
                alert("Error: " + text);
                throw new Error(text);
            }

            alert("Aduan berhasil dikirim");

            document.getElementById("message").value = "";
            fileInput.value = "";
            preview.innerHTML = "";

        } catch {
            alert("Gagal kirim");
        }

        btn.disabled = false;
        btn.textContent = "Kirim";
    }
</script>

</body>
</html>
