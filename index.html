<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilik Aduan</title>

    <style>
        body {
            margin: 0;
            font-family: "Inter", "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #f5f7fb, #eef2f7);
        }

        header {
            background: linear-gradient(135deg, #0b3d91, #2563eb);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 60px 20px;
        }

        .card{
            background: white;
            width: 100%;
            max-width: 420px;
            padding: 30px 26px;
            border-radius: 16px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
            animation: fadeIn 0.4s ease;
        }

        h2 {
            margin-bottom: 25px;
            text-align: center;
            color: #1e40af;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #374151;
        }

        select, textarea, input {
            width: 100%;
            margin-top: 6px;
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            font-size: 14px;
            background: #f9fafb;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        select:focus, textarea:focus, input:focus {
            outline: none;
            border-color: #2563eb;
            background: white;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
        }

        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(37,99,235,0.3);
        }

        .preview {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        .preview img {
            width: 70px;
            border-radius: 8px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<header>SISTEM BILIK ADUAN</header>
<p style="text-align:center; font-size:16px; color:#6b7280; margin-top: 10px;">
    Sampaikan aduan Anda secara aman dan anonim
</p>

<div class="container">
    <div class="card">

        <h2>Form Aduan</h2>

        <label>Tujuan</label>
        <select id="target">
            <option value="HR">HR</option>
            <option value="Manager">Manager</option>
        </select>

        <textarea id="message" placeholder="Pesan aduan"></textarea>

        <label>Lampiran (wajib)</label>
        <input type="file" id="file" multiple>

        <div class="preview" id="preview"></div>

        <button id="submitBtn">Kirim Aduan</button>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
    const fileInput = document.getElementById("file");
    const preview = document.getElementById("preview");
    const btn = document.getElementById("submitBtn");

    fileInput.addEventListener("change", () => {
        preview.innerHTML = "";
        for (let file of fileInput.files) {
            if (file.type.startsWith("image")) {
                const img = document.createElement("img");
                img.src = URL.createObjectURL(file);
                preview.appendChild(img);
            }
        }
    });

    btn.addEventListener("click", submitForm);

    async function submitForm() {
        const target = document.getElementById("target").value;
        const message = document.getElementById("message").value;
        const files = fileInput.files;

        if (!message) return alert("Pesan wajib diisi");
        if (!files.length) return alert("Lampiran wajib ada");
            
        // basic validation
        for (let file of files) {
            if (file.size > 5 * 1024 * 1024) {
                return alert("File max 5MB");
            }
        }

        btn.disabled = true;
        btn.textContent = "Mengirim...";

        // Upload files
        const formData = new FormData();
        formData.append("target", target);
        formData.append("message", message);

        // append ALL files
        for (let file of files) {
            formData.append("files", file);
        };

        try {
            const res = await fetch("https://cejrgbgpugcdstlwiptr.supabase.co/functions/v1/submit-complaint", {
                method: "POST",
                body: formData
            });

            if (!res.ok) {
                const text = await res.text();
                console.error("SERVER ERROR:", text);
                alert("Error: " + text);
                throw new Error(text);
            }

            alert("Aduan berhasil dikirim");

            document.getElementById("message").value = "";
            fileInput.value = "";
            preview.innerHTML = "";

        } catch {
            alert("Gagal kirim");
        }

        btn.disabled = false;
        btn.textContent = "Kirim";
    }
</script>

</body>
</html>
