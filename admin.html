<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            padding: 20px;
        }

        .box {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-top: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div id="login" class="box">
    <h3>Admin Login</h3>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
</div>

<div id="dashboard" class="box" style="display: none;">
    <h3>Dashboard Aduan</h3>
    <button onclick="logout()">Logout</button>
    <div id="list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
    const supabaseClient = supabase.createClient(
        "https://cejrgbgpugcdstlwiptr.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNlanJnYmdwdWdjZHN0bHdpcHRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MjYwODcsImV4cCI6MjA5MjEwMjA4N30.UIZtSd6D_g7s7gARnnpy56W066iejzq8DajUviR5SA4"
    );

    checkUser();

    // Check session on Load
    async function checkUser() {
        const { data } = await supabaseClient.auth.getUser();

        if (data.user) {
            document.getElementById("login").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
            loadData();
        }
    }

    // Login
    async function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        const { error } = await supabaseClient.auth.signInWithPassword({
            email, password
        });

        if (error) alert("Login gagal");
        else location.reload();
    }

    // Logout
    async function logout() {
        await supabaseClient.auth.signOut();
        location.reload();
    }

    // Load data
    async function loadData() {
        const { data } = await supabaseClient
            .from("complaints")
            .select("*")
            .order("created_at", { ascending: false });

        const container = document.getElementById("list");
        container.innerHTML = "";

        data.forEach(item => {
            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <p><b>Target:</b> ${item.target}</p>
                <p>${item.message}</p>
                <p><b>Email:</b> ${item.sender_email || "-"}</p>
                <p><b>Waktu:</b> ${new Date(item.created_at).toLocaleString()}</p>

                <p>
                    <a href="https://cejrgbgpugcdstlwiptr.supabase.co/functions/v1/submit-complaint/get-file?path=${item.file_url}" target="_blank">
                        Lihat Lampiran
                    </a>
                </p>
            `;

            container.appendChild(div);
        });
    }
</script>

</body>
</html>
