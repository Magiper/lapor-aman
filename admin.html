<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: "Inter", "Segoe UI", sans-serif;
            background: #f5f7fb;
        }

        /* HEADER */
        header {
            background: linear-gradient(135deg, #0b3d91, #2563eb);
            color: white;
            padding: 18px;
            text-align: center;
            font-weight: 600;
        }

        /* CONTAINER */
        .container {
            max-width: 800px;
            margin: auto;
            padding: 30px 20px;
        }

        /* LOGIN BOX */
        .box {
            background: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        /* INPUT */
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
        }

        /* BUTTON */
        button {
            padding: 12px;
            width: 100%;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        /* DASHBOARD HEADER */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .meta {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 10px;
        }

        .message {
            margin: 10px 0;
        }

        .file a {
            display: inline-block;
            margin-top: 6px;
            font-size: 13px;
            color: #2563eb;
            text-decoration: none;
        }

        .empty {
            text-align: center;
            color: #888;
            margin-top: 40px;
        }

    </style>
</head>

<body>

<header>ADMIN BILIK ADUAN</header>
<div class="container">
    <!-- LOGIN -->>
    <div id="login" class="box">
        <h3>Admin Login</h3>
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" style="display: none;">
        <div class="topbar">
            <h3>Daftar Aduan</h3>
            <button onclick="logout()" style="width:auto;">Logout</button>
        </div>
        
        <div id="list"></div>

        <div id="pagination" style="text-align:center; margin-top:20px;"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
    const supabaseClient = supabase.createClient(
        "https://cejrgbgpugcdstlwiptr.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNlanJnYmdwdWdjZHN0bHdpcHRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MjYwODcsImV4cCI6MjA5MjEwMjA4N30.UIZtSd6D_g7s7gARnnpy56W066iejzq8DajUviR5SA4"
    );

    checkUser();

    // Check session on Load
    async function checkUser() {
        const { data } = await supabaseClient.auth.getUser();

        if (data.user) {
            document.getElementById("login").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
            loadData();
        }
    }

    // Login
    async function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        const { error } = await supabaseClient.auth.signInWithPassword({
            email, password
        });

        if (error) alert("Login gagal");
        else location.reload();
    }

    // Logout
    async function logout() {
        await supabaseClient.auth.signOut();
        location.reload();
    }

    // Load data
    let currentPage = 1;
    const pageSize = 5;

    async function loadData() {
        const from = (currentPage - 1) * pageSize;
        const to = from + pageSize - 1;

        const { data } = await supabaseClient
            .from("complaints")
            .select("*")
            .order("created_at", { ascending: false })
            .range(from, to);

        const container = document.getElementById("list");
        container.innerHTML = "";

        if (!data || data.length === 0) {
            container.innerHTML = `<div class="empty">Belum ada aduan</div>`;
            return;
        }

        data.forEach(item => {
            const div = document.createElement("div");
            div.className = "card";

            const filesHTML = (item.files || []).map(path => `
                <div class="file">
                    🔗 <a href="https://cejrgbgpugcdstlwiptr.supabase.co/functions/v1/get-file?path=${path}" target="_blank">
                        Lihat Lampiran
                    </a>
                </div>
            `).join("");

            div.innerHTML = `
                <div class="meta">
                    ${new Date(item.created_at).toLocaleString()} • ${item.target}
                </div>

                <div class="message">${item.message}</div>

                <div class="meta">
                    Email: ${item.sender_email ? "User menyertakan email" : "Anonim"}
                </div>

                ${filesHTML}
            `;

            container.appendChild(div);
        });

        renderPagination();
    }

    function renderPagination() {
        const container = document.getElementById("pagination");

        container.innerHTML = `
            <button onclick="prevPage()">←</button>
            <span style="margin: 0 10px;">Page ${currentPage}</span>
            <button onclick="nextPage()">→</button>
        `;
    }

    function nextPage() {
        currentPage++;
        loadData();
    }

    function prevPage() {
        if (currentPage > 1) {
            currentPage--;
            loadData();
        }
    }

</script>

</body>
</html>
